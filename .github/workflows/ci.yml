name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: cerohuella-ia-ci

jobs:
  test-build-scan:
    name: Test, build and scan
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]

      - name: Validate FastAPI import
        run: |
          python -c "import app.main; print('FastAPI app import ok')"

      - name: Run tests
        run: |
          pytest --junitxml=pytest-results.xml

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: pytest-results.xml
          if-no-files-found: ignore

      - name: Build Docker image
        run: |
          docker build \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${IMAGE_NAME}:latest" \
            .

      - name: Scan Docker image with Trivy
        run: |
          mkdir -p security-reports
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v trivy-cache:/root/.cache \
            -v "${PWD}/security-reports:/reports" \
            aquasec/trivy:latest image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format json \
            --output /reports/trivy-image.json \
            "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: security-reports/
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          {
            echo "## CI summary"
            echo ""
            echo "- Python: ${PYTHON_VERSION}"
            echo "- Image: ${IMAGE_NAME}:${GITHUB_SHA}"
            echo "- Tests: pytest-results artifact"
            echo "- Security: security-reports artifact"
          } >> "${GITHUB_STEP_SUMMARY}"

