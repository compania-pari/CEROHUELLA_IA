name: Apply prod academic

on:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/apply-prod-academic.yml"

permissions:
  contents: read
  id-token: write

env:
  TERRAFORM_VERSION: "1.15.1"

jobs:
  apply-prod:
    name: Terraform apply prod
    runs-on: ubuntu-24.04
    environment: dev
    timeout-minutes: 45

    env:
      TF_VAR_acr_id: ${{ vars.ACR_ID }}
      TF_VAR_acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      TF_VAR_google_cloud_project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
      TF_VAR_google_application_credentials_b64: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_B64 }}
      TF_VAR_postgres_admin_password: ${{ secrets.PROD_POSTGRES_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Build backend config
        working-directory: infra/terraform/envs/prod
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "${{ vars.TFSTATE_RESOURCE_GROUP_NAME }}"
          storage_account_name = "${{ vars.TFSTATE_STORAGE_ACCOUNT_NAME }}"
          container_name       = "${{ vars.TFSTATE_CONTAINER_NAME }}"
          key                  = "envs/prod/terraform.tfstate"
          EOF

      - name: Terraform init
        working-directory: infra/terraform/envs/prod
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform plan
        working-directory: infra/terraform/envs/prod
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: infra/terraform/envs/prod
        run: terraform apply -input=false -auto-approve tfplan

      - name: Smoke test
        id: smoke
        run: |
          fqdn="$(az containerapp show \
            --name "ca-cerohuella-api-prod" \
            --resource-group "rg-cerohuella-prod" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          url="https://${fqdn}/health"
          for attempt in {1..24}; do
            if curl --fail --silent --show-error "${url}"; then
              echo "url=https://${fqdn}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "Waiting for healthy prod revision, attempt ${attempt}/24"
            sleep 5
          done
          exit 1

      - name: Job summary
        if: always()
        run: |
          {
            echo "## PROD academic apply"
            echo ""
            echo "- Terraform state key: envs/prod/terraform.tfstate"
            echo "- Container App: ca-cerohuella-api-prod"
            echo "- Resource group: rg-cerohuella-prod"
            echo "- Health URL: ${{ steps.smoke.outputs.url }}/health"
          } >> "${GITHUB_STEP_SUMMARY}"
