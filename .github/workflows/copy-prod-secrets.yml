name: Copy prod secrets

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  copy:
    name: Copy dev secrets to prod
    runs-on: ubuntu-24.04
    environment: dev
    steps:
      - name: Copy secrets
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          GOOGLE_CLOUD_PROJECT_ID_VALUE: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_B64_VALUE: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_CLOUD_PROJECT_ID_VALUE}" ] || [ -z "${GOOGLE_APPLICATION_CREDENTIALS_B64_VALUE}" ]; then
            echo "Required dev secrets are missing."
            exit 1
          fi

          postgres_password="$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c 32)"

          gh secret set GOOGLE_CLOUD_PROJECT_ID \
            --repo "${REPOSITORY}" \
            --env prod \
            --body "${GOOGLE_CLOUD_PROJECT_ID_VALUE}"

          gh secret set GOOGLE_APPLICATION_CREDENTIALS_B64 \
            --repo "${REPOSITORY}" \
            --env prod \
            --body "${GOOGLE_APPLICATION_CREDENTIALS_B64_VALUE}"

          gh secret set POSTGRES_ADMIN_PASSWORD \
            --repo "${REPOSITORY}" \
            --env prod \
            --body "${postgres_password}"

          echo "Prod secrets configured."
