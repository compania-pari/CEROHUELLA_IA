version: 0.2

env:
  variables:
    AWS_ACCOUNT_ID: "056639708411"
    IMAGE_REPOSITORY: "cerohuella-ia"
    IMAGE_ARTIFACT_DIR: "artifacts"
    ECS_CLUSTER: "default"
    ECS_SERVICE: "ecs-cerohuella-ia-dev"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python -m pip install --upgrade pip setuptools wheel
      - python -m pip install -e .[dev]

  pre_build:
    commands:
      - python -c "import app.main; print('FastAPI app import ok')"
      - pytest --junitxml=pytest-results.xml
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - export IMAGE_TAG=$CODEBUILD_BUILD_NUMBER
      - export IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPOSITORY
      - docker build --tag $IMAGE_URI:$IMAGE_TAG --tag $IMAGE_URI:latest .
      - docker push $IMAGE_URI:$IMAGE_TAG
      - docker push $IMAGE_URI:latest

  post_build:
    commands:
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" -ne 1 ]; then
          echo "Build failed; skipping image artifact export and ECS deployment."
          exit 1
        fi
      - mkdir -p $IMAGE_ARTIFACT_DIR
      - docker save $IMAGE_URI:$IMAGE_TAG | gzip > $IMAGE_ARTIFACT_DIR/$IMAGE_REPOSITORY-$IMAGE_TAG.tar.gz
      - |
        cat > $IMAGE_ARTIFACT_DIR/image.env <<EOF
        AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID
        AWS_REGION=$AWS_DEFAULT_REGION
        IMAGE_REPOSITORY=$IMAGE_REPOSITORY
        IMAGE_TAG=$IMAGE_TAG
        IMAGE_URI=$IMAGE_URI:$IMAGE_TAG
        IMAGE_ARTIFACT=$IMAGE_REPOSITORY-$IMAGE_TAG.tar.gz
        ECS_CLUSTER=$ECS_CLUSTER
        ECS_SERVICE=$ECS_SERVICE
        EOF
      - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment
      - aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE

artifacts:
  files:
    - pytest-results.xml
    - artifacts/**/*
